<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; user-select: none; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      cursor: default;
    }
    #cat {
      width: 160px;
      height: 160px;
      background-image: url('../resources/spritesheet.png');
      background-size: 1600px 2400px;
      background-position: 0px 0px;
      position: absolute;
      top: 0; left: 0;
      image-rendering: auto;
    }
    #toast {
      position: absolute;
      bottom: 4px;
      left: 8px;
      right: 8px;
      text-align: center;
      color: #fff;
      font-size: 10px;
      background: rgba(0,0,0,0.7);
      padding: 2px 4px;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="cat"></div>
  <div id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
